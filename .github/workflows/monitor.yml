name: Codex quota reset monitor

on:
  schedule:
    # Off-peak minutes reduce (but cannot eliminate) GitHub schedule delays.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      test_latest_log:
        description: Send one clearly labelled Tibo reset-completed format test
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: codex-quota-reset-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out monitor
        uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: codex-reset-state-${{ github.run_id }}
          restore-keys: |
            codex-reset-state-

      - name: Test monitor logic
        shell: pwsh
        run: |
          ./tests/run.ps1
          node --test ./tests/account-monitor.test.mjs

      - name: Check reset signals
        shell: pwsh
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if ('${{ github.event.inputs.test_latest_log }}' -eq 'true') {
            ./monitor.ps1 -TestLatestLog
          } else {
            ./monitor.ps1
          }

      - name: Save notification state
        if: ${{ always() && github.event.inputs.test_latest_log != 'true' && hashFiles('state.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: codex-reset-state-${{ github.run_id }}
